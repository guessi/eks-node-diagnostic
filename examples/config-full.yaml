---
# region of the target Amazon S3 bucket for storing diagnostic logs
region: us-east-1

# expiration second of the S3 Presigned URL (default: 300s)
expiredSeconds: 300

# timeout for operations in seconds (default: 30s)
# timeout: 30

# destination type could be "s3" or "node"
# - "node" only available for "Node Monitoring Agent" >= v1.6.1
destinationType: s3

# S3 bucket to store the tarball(s) generated by "NodeDiagnostic"
bucketName: node-diagnostic-EXAMPLE

# target node(s), the node name should match the NAME from `kubectl get nodes`
# $ kubectl get nodes -o jsonpath='{range .items[*]}{"- "}{.metadata.name}{"\n"}{end}'
nodes: []
# nodes:
# - ip-192-168-100-200.ec2.internal
# - i-EXAMPLE1111111111